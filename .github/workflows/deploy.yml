name: Deploy to Lambda

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to ECR Public
        run: |
          aws ecr-public get-login-password --region us-east-1 | \
            docker login --username AWS --password-stdin public.ecr.aws

      - name: Build, tag, and push image
        run: |
          docker build --platform linux/amd64 -t ai-powered-documentation-assistant .
          docker tag ai-powered-documentation-assistant:latest \
            public.ecr.aws/${{ secrets.ECR_ALIAS }}/ai-powered-documentation-assistant:latest
          docker push \
            public.ecr.aws/${{ secrets.ECR_ALIAS }}/ai-powered-documentation-assistant:latest

      - name: Update Lambda function
        run: |
          aws lambda update-function-code \
            --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }} \
            --image-uri public.ecr.aws/${{ secrets.ECR_ALIAS }}/ai-powered-documentation-assistant:latest \
            --region ap-south-1
